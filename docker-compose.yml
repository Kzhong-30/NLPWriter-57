version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: volunteer_postgres
    environment:
      POSTGRES_USER: volunteer
      POSTGRES_PASSWORD: volunteer123
      POSTGRES_DB: volunteer_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U volunteer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
